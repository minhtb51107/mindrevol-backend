spring.application.name=mindrevol-backend
server.port=8080
server.ssl.enabled=false
spring.jpa.open-in-view=false

# Allow bean definition overriding for test mocks
spring.main.allow-bean-definition-overriding=true

# 1. C?u hěnh H2 Database (Database ?o trong RAM)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. C?u hěnh JPA/Hibernate cho Test
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# T? ??ng t?o b?ng t? Entity (vě H2 lŕ db tr?ng)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# 3. T?t Liquibase (?? Hibernate t? lo vi?c t?o b?ng cho nhanh)
spring.liquibase.enabled=false

# 4. C?u hěnh JWT gi? (?? test không b? l?i thi?u bi?n môi tr??ng)
app.jwt.secret=day-la-mot-chuoi-bi-mat-rat-dai-va-an-toan-cho-test-env-only-phai-du-64-ky-tu-de-chay-hs512
app.jwt.access-token-expiration-ms=3600000
app.jwt.refresh-token-expiration-ms=86400000

# 5. Security & Auth
app.security.max-concurrent-sessions=5

# 6. OAuth2 (Google) - Fake values for testing
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.client-id=fake-google-client-id
spring.security.oauth2.client.registration.google.client-secret=fake-google-client-secret
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/oauth2/callback/google
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.registration.apple.client-id=com.mindrevol.app

# 7. Email Service
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=fake@mail.com
spring.mail.password=fake-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
spring.mail.properties.mail.debug=false

# 8. Upload Service
imagekit.upload-url=https://upload.imagekit.io/api/v1/files/upload
imagekit.url-endpoint=fake-endpoint
imagekit.public-key=fake-public-key
imagekit.private-key=fake-private-key
file.upload-dir=uploads-test

# 9. Redis - Set non-existent localhost for mocking
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.ssl.enabled=false

# Disable Redis health checks
management.health.redis.enabled=false
spring.data.redis.repositories.enabled=false

# 10. Logging & Monitoring
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# 11. External Services
firebase.credentials.base64="ewogICJ0eXBlIjogInNlcnZpY2VfYWNjb3VudCIsCiAgInByb2plY3RfaWQiOiAibWluZHJldm9sLWE3ZTZiIgp9"
tiktok.client-key=fake-key
tiktok.client-secret=fake-secret
app.payment.sepay-token=fake-token

# 12. Business Rules
app.ratelimit.login.limit=5
app.ratelimit.login.duration-min=1
app.ratelimit.general.limit=100
app.ratelimit.general.duration-min=1
app.ratelimit.strict.limit=10
app.ratelimit.strict.duration-hour=1
app.ratelimit.otp.limit=5
app.ratelimit.otp.duration-min=1
app.gamification.points.checkin-normal=10
app.gamification.points.checkin-comeback=100
app.gamification.points.item-freeze-cost=500
app.cache.ttl-minutes=10
app.journey.limit.max-active-journeys=5
app.gamification.enabled=true
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,https://localhost:5173

# 13. Content Moderation
app.moderation.enabled=false
app.moderation.api-user=fake-user
app.moderation.api-secret=fake-secret

# 14. Email API
app.email.api-key=fake-api-key
app.email.sender-email=fake@example.com
app.email.sender-name=MindRevol

